id: Scenario-36-Cloud-Description-Not-Dirty
name: 36. Cloud Description Respected When Local Not Dirty
tags:
  - passing
  - gamesaves
description: |
  Tests that when local description is NOT dirty (not set offline), cloud description is used.
  This is the counterpart to scenario-29 which tests dirty=true preserves local.
  DeviceA sets description online and uploads, DeviceB updates description and uploads,
  then DeviceA reconnects and verifies it receives DeviceB's cloud description.
devices:
  DeviceA: {}
  DeviceB: {}
defaults:
  stepTimeoutSeconds: 240
blocks:
  setup-and-set-description:
    # DeviceA sets description online and uploads
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: DeleteSaveRoot
      parameters:
        preserveManifest: false
    # Write a file so we have something to upload
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateBinaryFile
            relativePath: testdata/file1.bin
            bytes: 1024
            pattern: [0xAA, 0xBB, 0xCC, 0xDD]
    # Set description ONLINE (this goes to cloud, dirty=false locally)
    - command: PFGameSaveFilesSetSaveDescriptionAsync
      parameters:
        description: "Description set by DeviceA online"
    - command: PFGameSaveFilesGetSaveDescription
      parameters:
        expectedDescription: "Description set by DeviceA online"
    # Upload with description
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  update-cloud-description:
    # DeviceB syncs, updates description, uploads - this becomes the "newer" cloud description
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    # Verify we got DeviceA's description
    - command: PFGameSaveFilesGetSaveDescription
      parameters:
        expectedDescription: "Description set by DeviceA online"
    # Update description to something new
    - command: PFGameSaveFilesSetSaveDescriptionAsync
      parameters:
        description: "Updated by DeviceB - this is newer"
    # Write a file change so upload has something to commit
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateBinaryFile
            relativePath: testdata/file2.bin
            bytes: 512
            pattern: [0xDD, 0xCC, 0xBB, 0xAA]
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  devicea-reconnect-verify-cloud:
    # DeviceA reconnects - local is NOT dirty, so should get DeviceB's cloud description
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    # Don't delete local folder - we want to keep DeviceA's localstate.json with dirty=false
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    # KEY TEST: Local was NOT dirty, so we should see DeviceB's cloud description
    - command: PFGameSaveFilesGetSaveDescription
      parameters:
        expectedDescription: "Updated by DeviceB - this is newer"
    - command: DeleteSaveRoot
      parameters:
        preserveManifest: false
executionOrder:
  - role: DeviceA
    block: setup-and-set-description
  - role: DeviceB
    block: update-cloud-description
  - role: DeviceA
    block: devicea-reconnect-verify-cloud
cleanup:
  DeviceA:
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  DeviceB:
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
