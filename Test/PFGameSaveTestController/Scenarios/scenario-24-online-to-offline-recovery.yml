id: Scenario-24-Online-To-Offline-Recovery
name: 24. Online-to-Offline Recovery
tags:
  - passing
  - gamesaves
description: |
  Start with online state, lose connectivity mid-operation, verify graceful degradation and recovery.
devices:
  DeviceA: {}
defaults:
  stepTimeoutSeconds: 240
blocks:
  online-baseline:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: DeleteSaveRoot
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateTextFile
            relativePath: session/data.txt
            content: "ONLINE_BASELINE"
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: left
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  lose-connectivity:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    # Simulate connectivity loss for upload
    - command: ConfigureHttpMock
      parameters:
        method: POST
        url: "https://E18D7.playfabapi.com/GameSave/InitiateUpload"
        statusCode: 503
    # Configure sync-failed auto-responder to Cancel (don't retry forever)
    - command: PFGameSaveFilesSetUiSyncFailedAutoResponse
      parameters:
        enable: true
        action: Cancel
    # Mutate offline
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateTextFile
            relativePath: session/data.txt
            content: "OFFLINE_MUTATION"
    # Upload should fail (E_CANCELLED = 0x800704C7)
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        expectedHr: "0x800704C7"
        mode: KeepDeviceActive
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: right
    # Clear mocks and auto-responder
    - command: ClearHttpMocks
    - command: PFGameSaveFilesSetUiSyncFailedAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  reconnect-and-sync:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesSetUiConflictAutoResponse
      parameters:
        enable: true
        action: UseLocal
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    # Sync should detect offline changes
    - command: PFGameSaveFilesAddUserWithUiAsync
    # Upload the offline changes
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: left
    # Verify offline mutation uploaded (left should match right from lose-connectivity)
    - command: CompareSaveContainerSnapshots
      parameters:
        slot: right
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
executionOrder:
  - role: DeviceA
    block: online-baseline
  - role: DeviceA
    block: lose-connectivity
  - role: DeviceA
    block: reconnect-and-sync
cleanup:
  DeviceA:
    - command: ClearHttpMocks
    - command: PFGameSaveFilesSetUiSyncFailedAutoResponse
      parameters:
        enable: false
    - command: PFGameSaveFilesSetUiConflictAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
