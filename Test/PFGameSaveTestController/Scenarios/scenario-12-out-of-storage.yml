id: Scenario-12-Out-Of-Storage-UI-Handling
name: 12. Out-of-Storage UI Handling
tags:
  - failing
  - gamesaves
description: |
  Fill disk, trigger out-of-storage callback, test Retry after freeing space and Cancel without freeing.
  Note: This test requires ConsumeDiskSpace/ReleaseDiskSpace commands to be implemented.
devices:
  DeviceA: {}
defaults:
  stepTimeoutSeconds: 300
blocks:
  setup-and-test-retry:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: DeleteSaveRoot
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateBinaryFile
            relativePath: payload/data.bin
            bytes: 16384
            pattern: [0xDA, 0x7A]
    # Consume disk space
    - command: ConsumeDiskSpace
      parameters:
        bytes: 1073741824
        tempPath: "C:\\temp\\diskfill"
    # Set auto-response for out-of-storage to Retry
    - command: PFGameSaveFilesSetUiOutOfStorageAutoResponse
      parameters:
        enable: true
        action: Retry
    # Free space before upload so retry succeeds
    - command: ReleaseDiskSpace
      parameters:
        tempPath: "C:\\temp\\diskfill"
    # Upload should succeed after space freed
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: KeepDeviceActive
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: left
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  test-cancel:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateBinaryFile
            relativePath: payload/data.bin
            bytes: 2048
            pattern: [0xCA, 0x1C, 0xE1]
    # Consume disk again
    - command: ConsumeDiskSpace
      parameters:
        bytes: 1073741824
        tempPath: "C:\\temp\\diskfill2"
    # Set auto-response to Cancel
    - command: PFGameSaveFilesSetUiOutOfStorageAutoResponse
      parameters:
        enable: true
        action: Cancel
    # Upload should be canceled (E_CANCELLED = 0x800704C7)
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        expectedHr: "0x800704C7"
        mode: KeepDeviceActive
    # Free space and retry
    - command: ReleaseDiskSpace
      parameters:
        tempPath: "C:\\temp\\diskfill2"
    - command: PFGameSaveFilesSetUiOutOfStorageAutoResponse
      parameters:
        enable: false
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: right
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
executionOrder:
  - role: DeviceA
    block: setup-and-test-retry
  - role: DeviceA
    block: test-cancel
cleanup:
  DeviceA:
    - command: PFGameSaveFilesSetUiOutOfStorageAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
    - command: ReleaseDiskSpace
      parameters:
        tempPath: "C:\\temp\\diskfill"
    - command: ReleaseDiskSpace
      parameters:
        tempPath: "C:\\temp\\diskfill2"
