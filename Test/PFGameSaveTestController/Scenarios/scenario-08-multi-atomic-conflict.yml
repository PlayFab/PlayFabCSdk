id: Scenario-08-Multi-Atomic-Conflict-Decision
name: 8. Multi-Atomic Conflict Decision Application
tags:
  - gamesaves
  - passing
description: |
  Tests all-or-nothing conflict resolution with multiple atomic units.
  Three atomic units (slotA, slotB, settings). DeviceA uploads baseline, DeviceB downloads and uploads changes to slotA and slotB.
  DeviceA modifies slotA and slotB locally (not settings). When DeviceA syncs via AddUserWithUiAsync,
  conflict is detected in both slotA and slotB. TakeLocal applies to entire save.
  Note: Per docs, conflict resolution is all-or-nothing. "Keep Local" means ALL cloud changes are skipped,
  including the untouched settings folder (which had no cloud changes anyway in this test).
devices:
  DeviceA: {}
  DeviceB: {}
defaults:
  stepTimeoutSeconds: 240
blocks:
  devicea-upload-baseline:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    # Reset cloud state to ensure clean baseline (avoid stale data from previous tests)
    - command: PFGameSaveFilesResetCloudAsync
    # After ResetCloud, must re-init gamesaves and re-add user to get fresh manifest
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: DeleteSaveRoot
    # Create three atomic units
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateBinaryFile
            relativePath: slotA/character.sav
            bytes: 4096
            pattern: [0xA1, 0xBA, 0x5E]
          - verb: CreateBinaryFile
            relativePath: slotB/companion.sav
            bytes: 4096
            pattern: [0xB1, 0xBA, 0x5E]
          - verb: CreateTextFile
            relativePath: settings/options.json
            content: '{"version":"baseline","volume":100}'
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  deviceb-download-and-upload-changes:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    # Download baseline from cloud
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    # Mutate slotA and slotB (settings untouched) and upload - becomes cloud state
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateBinaryFile
            relativePath: slotA/character.sav
            bytes: 5120
            pattern: [0xA1, 0xC1, 0x0D]
          - verb: CreateBinaryFile
            relativePath: slotB/companion.sav
            bytes: 5120
            pattern: [0xB1, 0xC1, 0x0D]
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  devicea-local-changes-and-sync-conflict:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    # Mutate BOTH slotA and slotB locally (settings still untouched)
    # Local still has baseline from previous session
    - command: WriteGameSaveData
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
        operations:
          - verb: CreateBinaryFile
            relativePath: slotA/character.sav
            bytes: 6144
            pattern: [0xA1, 0x10, 0xCA, 0x1]
          - verb: CreateBinaryFile
            relativePath: slotB/companion.sav
            bytes: 6144
            pattern: [0xB1, 0x10, 0xCA, 0x1]
    # Capture local state before conflict resolution
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: left
        saveFolder: "C:\\gamesave\\DeviceA"
    # TakeLocal should apply to entire save (all-or-nothing)
    - command: PFGameSaveFilesSetUiConflictAutoResponse
      parameters:
        enable: true
        action: UseLocal
    # AddUserWithUiAsync detects conflict in slotA and slotB
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    # Capture after conflict resolution
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: right
    # Verify both slotA and slotB match local (TakeLocal preserved local changes)
    - command: CompareSaveContainerSnapshots
    # Upload local version to cloud
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
executionOrder:
  - role: DeviceA
    block: devicea-upload-baseline
  - role: DeviceB
    block: deviceb-download-and-upload-changes
  - role: DeviceA
    block: devicea-local-changes-and-sync-conflict
cleanup:
  DeviceA:
    - command: PFGameSaveFilesSetUiConflictAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
  DeviceB:
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceB"
