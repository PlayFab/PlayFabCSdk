id: Scenario-22-File-Folder-Deletion-Propagation
name: 22. File/Folder Deletion Propagation
tags:
  - passing
  - gamesaves
description: |
  Delete files/folders on one device, verify propagation to other devices.
devices:
  DeviceA: {}
  DeviceB: {}
defaults:
  stepTimeoutSeconds: 240
blocks:
  setup-baseline:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: DeleteSaveRoot
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateTextFile
            relativePath: slotA/file1.txt
            content: "FILE_1"
          - verb: CreateTextFile
            relativePath: slotA/file2.txt
            content: "FILE_2"
          - verb: CreateTextFile
            relativePath: slotB/data.txt
            content: "SLOT_B_DATA"
          - verb: CreateTextFile
            relativePath: keep/preserve.txt
            content: "PRESERVED"
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  delete-files-and-folders:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    # Delete specific file and folder
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: DeleteFile
            relativePath: slotA/file1.txt
          - verb: DeleteFolder
            relativePath: slotB
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: left
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  verify-propagation:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    # Download should reflect deletions
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: right
    # Verify: slotA/file1.txt and slotB folder should be missing
    # slotA/file2.txt and keep/preserve.txt should remain
    - command: CompareSaveContainerSnapshots
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
executionOrder:
  - role: DeviceA
    block: setup-baseline
  - role: DeviceA
    block: delete-files-and-folders
  - role: DeviceB
    block: verify-propagation
cleanup:
  DeviceA:
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
  DeviceB:
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceB"
