id: Scenario-03-Offline-To-Online-Reconnect
name: 3. Basic Offline-to-Online Reconnect
tags:
  - passing
  - gamesaves
description: Forces offline mode with retryable failures, validates offline operations, then reconnects and uploads successfully.
devices:
  DeviceA: {}
defaults:
  stepTimeoutSeconds: 240
blocks:
  initialize-and-force-offline:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    # Configure auto-response to retry once, then switch to UseOffline
    - command: PFGameSaveFilesSetUiSyncFailedAutoResponse
      parameters:
        enable: true
        action: Retry
        maxRetries: 1
    # Configure HTTP mocks to force connectivity failures
    - command: ConfigureHttpMock
      parameters:
        method: POST
        url: "https://E18D7.playfabapi.com/GameSave/ListManifests"
        statusCode: 503
    - command: ConfigureHttpMock
      parameters:
        method: POST
        url: "https://E18D7.playfabapi.com/GameSave/GetManifestDownloadDetails"
        statusCode: 503
    - command: ConfigureHttpMock
      parameters:
        method: POST
        url: "https://E18D7.playfabapi.com/Client/LoginWithCustomID"
        statusCode: 503
    # Attempt to add user - should retry once, then enter offline mode
    - command: PFGameSaveFilesAddUserWithUiAsync
      timeoutSeconds: 120
    # Verify offline status
    - command: PFGameSaveFilesIsConnectedToCloud
      parameters:
        expectedConnected: false
    - command: PFGameSaveFilesGetFolder
  offline-operations:
    # Create offline payload
    - command: DeleteSaveRoot
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateBinaryFile
            relativePath: offline/payload_offline.bin
            bytes: 8192
            pattern: [0x0F, 0xF1, 0x1E]
    # Configure HTTP mocks for upload endpoints to keep offline
    - command: ConfigureHttpMock
      parameters:
        method: POST
        url: "https://E18D7.playfabapi.com/GameSave/InitiateUpload"
        statusCode: 503
    - command: ConfigureHttpMock
      parameters:
        method: POST
        url: "https://E18D7.playfabapi.com/GameSave/FinalizeManifest"
        statusCode: 503
    # Attempt offline upload (should return E_PF_GAMESAVE_DISCONNECTED_FROM_CLOUD = 0x89237004)
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: KeepDeviceActive
        expectedHr: "0x89237004"
    # Verify still offline
    - command: PFGameSaveFilesIsConnectedToCloud
      parameters:
        expectedConnected: false
    - command: PFGameSaveFilesGetFolderSize
  reconnect-and-sync:
    # Clear HTTP mocks to restore connectivity
    - command: ClearHttpMocks
    # Clear sync-failed auto-response and allow normal retry
    - command: PFGameSaveFilesSetUiSyncFailedAutoResponse
      parameters:
        enable: true
        action: Retry
    # Reconnect to cloud
    - command: PFGameSaveFilesAddUserWithUiAsync
      timeoutSeconds: 120
    # Verify online status
    - command: PFGameSaveFilesIsConnectedToCloud
      parameters:
        expectedConnected: true
    # Upload the offline changes
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: right
  verify-offline-progress:
    # Reinitialize and download to verify offline changes persisted
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    # Fresh session
    - command: XGameRuntimeInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: left
    # Compare with offline snapshot to verify integrity
    - command: CompareSaveContainerSnapshots
    - command: DeleteSaveRoot
      parameters:
        preserveManifest: false
executionOrder:
  - role: DeviceA
    block: initialize-and-force-offline
  - role: DeviceA
    block: offline-operations
  - role: DeviceA
    block: reconnect-and-sync
  - role: DeviceA
    block: verify-offline-progress
cleanup:
  DeviceA:
    - command: ClearHttpMocks
    - command: PFGameSaveFilesSetUiSyncFailedAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
