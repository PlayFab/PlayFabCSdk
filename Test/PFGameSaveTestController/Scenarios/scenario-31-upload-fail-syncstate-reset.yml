# Scenario 31: Verify syncState is reset after upload failure
# 
# Bug repro: When upload fails, syncState was not reset from "Uploading" to "NotStarted".
# This caused SetSaveDescriptionAsync to incorrectly defer (thinking upload was still in progress),
# and the deferred description would be lost since the upload had already failed.
#
# Test flow:
# 1. Start upload that fails (mock InitiateUpload to fail)
# 2. Call SetSaveDescriptionAsync immediately after
# 3. Without fix: syncState still "Uploading", description is deferred and lost
# 4. With fix: syncState reset to "NotStarted", SetSaveDescriptionAsync proceeds normally
# 5. Verify description is visible in the current session
#
# Note: We do NOT verify the description persists after a fresh session download, because
# the failed upload means the pending manifest version was never finalized. The description
# update applies to the pending manifest, but when we restart and download from service,
# we get the last finalized manifest which has the old description. This is correct behavior.

id: Scenario-31-Upload-Fail-SyncState-Reset
name: 31. Upload Failure Resets SyncState for SetSaveDescription
tags:
  - passing
  - gamesaves
description: Verify that after an upload failure, syncState is reset so SetSaveDescriptionAsync works correctly.
devices:
  DeviceA: {}
defaults:
  stepTimeoutSeconds: 180
blocks:
  setup-and-initial-upload:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\Scenario31"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: DeleteSaveRoot
    # Create initial save with a known description
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateBinaryFile
            relativePath: data/save.bin
            bytes: 4096
            pattern: [0x11, 0x22, 0x33, 0x44]
    - command: PFGameSaveFilesSetSaveDescriptionAsync
      parameters:
        description: "Initial description"
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: KeepDeviceActive
    # Cleanup
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle

  fail-upload-then-set-description:
    - command: XGameRuntimeInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\Scenario31"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    # Modify local file to trigger need for upload
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: ModifyFile
            relativePath: data/save.bin
            bytes: 1024
            pattern: [0xAA, 0xBB, 0xCC, 0xDD]
    # Mock InitiateUpload to fail - this simulates network error during upload
    - command: ConfigureHttpMock
      parameters:
        method: POST
        url: "https://E18D7.playfabapi.com/GameSave/InitiateUpload"
        statusCode: 500
    # Configure auto-response to cancel when sync fails (simulates user dismissing error)
    - command: PFGameSaveFilesSetUiSyncFailedAutoResponse
      parameters:
        enable: true
        action: Cancel
    # Upload should fail due to mock - will trigger SyncFailed callback which auto-responds with Cancel
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        expectedHr: "0x800704C7"
        mode: KeepDeviceActive
    # Clear the mock so subsequent calls succeed
    - command: ClearHttpMocks
    # Disable the auto-responder
    - command: PFGameSaveFilesSetUiSyncFailedAutoResponse
      parameters:
        enable: false
    # KEY TEST: Call SetSaveDescriptionAsync immediately after upload failure
    # Without fix: syncState is still "Uploading", this defers and description is lost
    # With fix: syncState is "NotStarted", this proceeds normally and updates service
    - command: PFGameSaveFilesSetSaveDescriptionAsync
      parameters:
        description: "Description after failed upload"
    # Verify the description was actually applied (not deferred and lost)
    - command: PFGameSaveFilesGetSaveDescription
      parameters:
        expectedDescription: "Description after failed upload"
    # Cleanup
    - command: DeleteSaveRoot
      parameters:
        preserveManifest: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle

executionOrder:
  - role: DeviceA
    block: setup-and-initial-upload
  - role: DeviceA
    block: fail-upload-then-set-description
cleanup:
  DeviceA:
    - command: ClearHttpMocks
    - command: PFGameSaveFilesSetUiSyncFailedAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\Scenario31"
