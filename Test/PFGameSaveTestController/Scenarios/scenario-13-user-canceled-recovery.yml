id: Scenario-13-User-Canceled-Sync-Upload-Recovery
name: 13. User-Canceled Sync/Upload Recovery
tags:
  - passing
  - gamesaves
description: |
  Cancel long-running download and upload mid-transfer, verify clean recovery and retry.
devices:
  DeviceA: {}
  DeviceB: {}
defaults:
  stepTimeoutSeconds: 300
blocks:
  seed-large-payload:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: DeleteSaveRoot
    # Create payload for cancellation testing (smaller but still enough to trigger progress callbacks)
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateMultipleBinaryFiles
            baseDirectory: largedata
            fileCount: 20
            bytesPerFile: 65536
            pattern: [0x1A, 0x2E, 0x3E]
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
      timeoutSeconds: 600
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  cancel-download-then-retry:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    # Set progress auto-response to Cancel
    - command: PFGameSaveFilesSetUiProgressAutoResponse
      parameters:
        enable: true
        action: Cancel
    # Download should cancel mid-transfer (E_CANCELLED = 0x800704C7)
    - command: PFGameSaveFilesAddUserWithUiAsync
      parameters:
        expectedHr: "0x800704C7"
      timeoutSeconds: 300
    # Clear auto-cancel and retry
    - command: PFGameSaveFilesSetUiProgressAutoResponse
      parameters:
        enable: false
    # Need to uninit/reinit to retry AddUserWithUiAsync
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
      timeoutSeconds: 600
    - command: PFGameSaveFilesGetFolder
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: left
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  cancel-upload-then-retry:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    # Mutate files
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateBinaryFile
            relativePath: largedata/file0000.bin
            bytes: 8192
            pattern: [0x11, 0x7A, 0x7E]
    # Cancel upload via progress callback
    - command: PFGameSaveFilesSetUiProgressAutoResponse
      parameters:
        enable: true
        action: Cancel
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        expectedHr: "0x800704C7"
        mode: KeepDeviceActive
    # Disable auto-cancel
    - command: PFGameSaveFilesSetUiProgressAutoResponse
      parameters:
        enable: false
    # Retry upload should succeed
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
      timeoutSeconds: 600
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: right
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
executionOrder:
  - role: DeviceA
    block: seed-large-payload
  - role: DeviceB
    block: cancel-download-then-retry
  - role: DeviceB
    block: cancel-upload-then-retry
cleanup:
  DeviceA:
    - command: PFGameSaveFilesSetUiProgressAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
  DeviceB:
    - command: PFGameSaveFilesSetUiProgressAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceB"
