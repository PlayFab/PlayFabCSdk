id: Scenario-10-Rollback-To-Last-Conflict
name: 10. Rollback to Last Conflict Recovery
tags:
  - failing
  - gamesaves
description: |
  DeviceA seeds a baseline, DeviceB downloads it. DeviceA publishes a cloud update.
  DeviceB modifies locally, then syncs via AddUserWithUiAsync which triggers conflict.
  DeviceB chooses TakeLocal (local wins, cloud becomes the preserved loser).
  DeviceA exercises RollbackToLastConflict to restore the preserved cloud loser.
devices:
  DeviceA: {}
  DeviceB: {}
defaults:
  stepTimeoutSeconds: 300
blocks:
  session-a-seed-baseline:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\Rollback\\DeviceA"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\Rollback\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: DeleteSaveRoot
      parameters:
        preserveManifest: false
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateFolder
            relativePath: slotA
          - verb: CreateBinaryFile
            relativePath: slotA/character.sav
            bytes: 256
            pattern: [0x43, 0x4C, 0x4F, 0x55, 0x44, 0x5F, 0x42, 0x41, 0x53, 0x45, 0x4C, 0x49, 0x4E, 0x45]
          - verb: CreateBinaryFile
            relativePath: slotA/baseline.tag
            bytes: 32
            pattern: [0x42, 0x41, 0x53, 0x45, 0x4C, 0x49, 0x4E, 0x45]
          - verb: CreateFolder
            relativePath: settings
          - verb: CreateBinaryFile
            relativePath: settings/options.json
            bytes: 64
            pattern: [0x7B, 0x22, 0x6D, 0x6F, 0x64, 0x65, 0x22, 0x3A, 0x22, 0x64, 0x65, 0x66, 0x61, 0x75, 0x6C, 0x74, 0x22, 0x7D]
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  session-b-download-baseline:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\Rollback\\DeviceB"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\Rollback\\DeviceB"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  session-a-publish-cloud-branch:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\Rollback\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    # Modify to create cloud branch (will become the preserved loser after conflict)
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateBinaryFile
            relativePath: slotA/character.sav
            bytes: 256
            pattern: [0x43, 0x4C, 0x4F, 0x55, 0x44, 0x5F, 0x42, 0x52, 0x41, 0x4E, 0x43, 0x48, 0x5F, 0x4C, 0x4F, 0x53, 0x45, 0x52]
          - verb: CreateBinaryFile
            relativePath: slotA/cloud-loser.tag
            bytes: 32
            pattern: [0x4C, 0x4F, 0x53, 0x45, 0x52]
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    # Capture cloud loser state - this is what rollback should restore
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: left
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  session-b-resolve-conflict:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\Rollback\\DeviceB"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    # Stage local modifications BEFORE AddUser (creates pending local changes)
    - command: WriteGameSaveData
      parameters:
        saveFolder: "C:\\gamesave\\Rollback\\DeviceB"
        operations:
          - verb: CreateBinaryFile
            relativePath: slotA/character.sav
            bytes: 256
            pattern: [0x4C, 0x4F, 0x43, 0x41, 0x4C, 0x5F, 0x42, 0x52, 0x41, 0x4E, 0x43, 0x48, 0x5F, 0x57, 0x49, 0x4E, 0x4E, 0x45, 0x52]
          - verb: CreateBinaryFile
            relativePath: slotA/local-winner.tag
            bytes: 32
            pattern: [0x4C, 0x4F, 0x43, 0x41, 0x4C]
    # Set conflict auto-response to TakeLocal (local wins, cloud becomes loser)
    - command: PFGameSaveFilesSetUiConflictAutoResponse
      parameters:
        enable: true
        action: UseLocal
    # AddUserWithUiAsync will detect conflict (local modified + cloud changed)
    # and resolve with TakeLocal, preserving cloud as the loser
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    # Upload local winner to cloud
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  session-a-rollback-validation:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\Rollback\\DeviceA"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\Rollback\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    # Add user with rollback option to get the preserved cloud loser
    - command: PFGameSaveFilesAddUserWithUiAsync
      parameters:
        rollbackOption: RollbackToLastConflict
    - command: PFGameSaveFilesGetFolder
    # Capture state after rollback - should match cloud loser (left)
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: right
    # Compare with cloud loser snapshot
    - command: CompareSaveContainerSnapshots
    - command: DeleteSaveRoot
      parameters:
        preserveManifest: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
executionOrder:
  - role: DeviceA
    block: session-a-seed-baseline
  - role: DeviceB
    block: session-b-download-baseline
  - role: DeviceA
    block: session-a-publish-cloud-branch
  - role: DeviceB
    block: session-b-resolve-conflict
  - role: DeviceA
    block: session-a-rollback-validation
cleanup:
  DeviceA:
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\Rollback\\DeviceA"
  DeviceB:
    - command: PFGameSaveFilesSetUiConflictAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\Rollback\\DeviceB"
