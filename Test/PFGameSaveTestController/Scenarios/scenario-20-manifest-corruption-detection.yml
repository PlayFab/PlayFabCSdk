id: Scenario-20-Manifest-Corruption-Detection
name: 20. Manifest Corruption Detection
tags:
  - failing
  - gamesaves
description: |
  Corrupt local manifest, verify detection and recovery via cloud redownload.
  Note: Requires CorruptManifestFile command to be implemented.
devices:
  DeviceA: {}
defaults:
  stepTimeoutSeconds: 240
blocks:
  setup-and-corrupt:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: DeleteSaveRoot
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateTextFile
            relativePath: slot/data.txt
            content: "BASELINE_DATA"
          - verb: CreateBinaryFile
            relativePath: slot/binary.bin
            bytes: 16384
            pattern: [0xBA, 0x5E]
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: left
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    # Corrupt manifest file
    - command: CorruptManifestFile
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
  detect-and-recover:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    # SDK should detect corruption and redownload from cloud
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: right
    # Verify recovered state matches pre-corruption
    - command: CompareSaveContainerSnapshots
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
executionOrder:
  - role: DeviceA
    block: setup-and-corrupt
  - role: DeviceA
    block: detect-and-recover
cleanup:
  DeviceA:
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
