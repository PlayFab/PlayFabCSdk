id: Scenario-04-Active-Device-Release-Reacquire
name: 4. Active Device Release and Reacquire
tags:
  - passing
  - gamesaves
description: Device A acquires lock, Device B takes control via SyncLastSavedData, uploads with release, then Device A regains lock and downloads Device B's changes.
devices:
  DeviceA: {}
  DeviceB: {}
defaults:
  stepTimeoutSeconds: 240
blocks:
  initial-acquire-and-upload:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    # Set auto-response for when Device B takes over (Device A will be notified)
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: DeleteSaveRoot
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateBinaryFile
            relativePath: slotA/character.sav
            bytes: 8192
            pattern: [0xDE, 0xA1]
    # Upload WITHOUT ReleaseDeviceAsActive to keep the lock
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: KeepDeviceActive
    - command: PFGameSaveFilesIsConnectedToCloud
      parameters:
        expectedConnected: true
    # Keep session alive for Device B contention - don't close handles
  reacquire-after-contention:
    # After Device B takes control and releases, Device A needs to re-initialize
    # to download the latest data. Must uninit first since user is already added.
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: right
    - command: PFGameSaveFilesIsConnectedToCloud
      parameters:
        expectedConnected: true
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  takeover-and-release:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    # Set auto-response for active device contention
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    # This should trigger contention callback since Device A has the lock
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateBinaryFile
            relativePath: slotA/character.sav
            bytes: 10240
            pattern: [0xDE, 0xB2]
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: left
    # Upload and release the lock
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  verify-data-integrity:
    - command: CompareSaveContainerSnapshots
executionOrder:
  - role: DeviceA
    block: initial-acquire-and-upload
  - role: DeviceB
    block: takeover-and-release
  - role: DeviceA
    block: reacquire-after-contention
  - role: DeviceA
    block: verify-data-integrity
cleanup:
  DeviceA:
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
  DeviceB:
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceB"
