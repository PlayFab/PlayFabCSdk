id: Scenario-14-Concurrent-Upload-Arbitration
name: 14. Concurrent Upload Arbitration
tags:
  - failing
  - gamesaves
description: |
  DeviceA holds active device lock without releasing. DeviceB tries to sync and encounters
  active device contention. DeviceB takes over via SyncLastSavedData, uploads, releases.
  DeviceA then verifies it can no longer upload (E_PF_GAMESAVE_DEVICE_NO_LONGER_ACTIVE).
devices:
  DeviceA: {}
  DeviceB: {}
defaults:
  stepTimeoutSeconds: 240
blocks:
  setup-baseline:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: DeleteSaveRoot
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateTextFile
            relativePath: shared/data.txt
            content: "BASELINE_VERSION_0"
    # Upload but KEEP device active (don't release)
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: KeepDeviceActive
    # Verify connected to cloud
    - command: PFGameSaveFilesIsConnectedToCloud
      parameters:
        expectedConnected: true
    # Keep session alive - don't close handles
  deviceb-takeover:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceB"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    # Auto-respond to contention with SyncLastSavedData (take over)
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: true
        action: SyncLastSavedData
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    # This triggers active device contention, auto-responds with SyncLastSavedData
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateTextFile
            relativePath: shared/data.txt
            content: "DEVICE_B_VERSION_1"
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: left
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  devicea-verify-disconnected:
    # DeviceA's session should now be disconnected from cloud
    # When DeviceA tries to upload, it will get a SyncFailed callback because
    # DeviceB took over as the active device. Configure auto-response to Cancel.
    - command: PFGameSaveFilesSetUiSyncFailedAutoResponse
      parameters:
        enable: true
        action: Cancel
    - command: WriteGameSaveData
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
        operations:
          - verb: CreateTextFile
            relativePath: shared/data.txt
            content: "DEVICE_A_ATTEMPT_AFTER_TAKEOVER"
    # Upload fails because DeviceA is no longer active. SyncFailed callback fires,
    # auto-responds with Cancel, result is E_CANCELLED (0x800704C7)
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: KeepDeviceActive
        expectedHr: "0x800704C7"
    # Verify no longer connected to cloud
    - command: PFGameSaveFilesIsConnectedToCloud
      parameters:
        expectedConnected: false
    - command: PFGameSaveFilesSetUiSyncFailedAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  devicea-reacquire-and-verify:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave\\DeviceA"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    # Auto-respond to conflict by accepting remote (DeviceB's) data
    - command: PFGameSaveFilesSetUiConflictAutoResponse
      parameters:
        enable: true
        action: AcceptRemote
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    # Capture DeviceA state after downloading DeviceB's changes
    - command: CaptureSaveContainerSnapshot
      parameters:
        slot: right
    # Verify DeviceA now has DeviceB's data
    - command: CompareSaveContainerSnapshots
    - command: PFGameSaveFilesSetUiConflictAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
executionOrder:
  - role: DeviceA
    block: setup-baseline
  - role: DeviceB
    block: deviceb-takeover
  - role: DeviceA
    block: devicea-verify-disconnected
  - role: DeviceA
    block: devicea-reacquire-and-verify
cleanup:
  DeviceA:
    - command: PFGameSaveFilesSetUiSyncFailedAutoResponse
      parameters:
        enable: false
    - command: PFGameSaveFilesSetUiConflictAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceA"
  DeviceB:
    - command: PFGameSaveFilesSetUiActiveDeviceContentionAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
    - command: DeleteLocalFolder
      parameters:
        folderPath: "C:\\gamesave\\DeviceB"
