id: Scenario-27-Progress-Cancel
name: 27. Progress Cancel During Download and Upload
tags:
  - passing
  - gamesaves
description: Verify that cancelling from the progress dialog during download and upload returns E_PF_GAMESAVE_USER_CANCELLED (0x800704c7).
devices:
  DeviceA: {}
defaults:
  stepTimeoutSeconds: 180
blocks:
  session-one-upload:
    - command: XGameRuntimeInitialize
    - command: PFInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    - command: PFGameSaveFilesAddUserWithUiAsync
    - command: PFGameSaveFilesGetFolder
    - command: DeleteSaveRoot
    - command: WriteGameSaveData
      parameters:
        operations:
          - verb: CreateBinaryFile
            relativePath: progress/payload.bin
            bytes: 10240
            pattern: [0xAA, 0xBB, 0xCC, 0xDD]
    # Enable auto-responder to cancel on progress callback for upload
    - command: PFGameSaveFilesSetUiProgressAutoResponse
      parameters:
        enable: true
        action: Cancel
    # This should fail with E_PF_GAMESAVE_USER_CANCELLED (0x800704c7)
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: KeepDeviceActive
        expectedHr: "0x800704c7"
    # Disable cancel auto-responder so upload succeeds
    - command: PFGameSaveFilesSetUiProgressAutoResponse
      parameters:
        enable: false
    # Now upload for real
    - command: PFGameSaveFilesUploadWithUiAsync
      parameters:
        mode: ReleaseDeviceAsActive
    - command: DeleteSaveRoot
      parameters:
        preserveManifest: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
  session-two-cancel-download:
    - command: XGameRuntimeInitialize
    - command: PFServicesInitialize
    - command: PFServiceConfigCreateHandle
      parameters:
        endpoint: "https://E18D7.playfabapi.com"
        titleId: "E18D7"
    - command: XTaskQueueCreate
      parameters:
        workMode: ThreadPool
        completionMode: ThreadPool
        setAsProcessQueue: true
    - command: PFGameSaveFilesInitialize
      parameters:
        saveFolder: "C:\\gamesave"
    - command: PFGameSaveFilesSetUiCallbacks
      parameters:
        enable: true
    - command: PFGameSaveFilesSetActiveDeviceChangedCallback
    - command: PFLocalUserCreateHandleWithPersistedLocalId
      parameters:
        persistedLocalId: "PFGameSaveTestHarness"
        customId: "PFGameSaveTestHarness"
        createAccount: true
    # Enable auto-responder to cancel on progress callback
    - command: PFGameSaveFilesSetUiProgressAutoResponse
      parameters:
        enable: true
        action: Cancel
    # This should fail with E_PF_GAMESAVE_USER_CANCELLED (0x800704c7)
    - command: PFGameSaveFilesAddUserWithUiAsync
      parameters:
        expectedHr: "0x800704c7"
    - command: DeleteSaveRoot
      parameters:
        preserveManifest: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
executionOrder:
  - role: DeviceA
    block: session-one-upload
  - role: DeviceA
    block: session-two-cancel-download
cleanup:
  DeviceA:
    - command: PFGameSaveFilesSetUiProgressAutoResponse
      parameters:
        enable: false
    - command: PFLocalUserCloseHandle
    - command: PFGameSaveFilesUninitializeAsync
    - command: PFServicesUninitializeAsync
    - command: PFUninitializeAsync
    - command: PFServiceConfigCloseHandle
    - command: XTaskQueueCloseHandle
